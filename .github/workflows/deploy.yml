name: Deploy Databricks App
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: azure-client-secret
      ARM_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.DATABRICKS_TENANT_ID }}

    steps:
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Verify Databricks auth
        run: databricks current-user me

      - name: Push secrets to Databricks Secret Scope
        env:
          APP_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          APP_TEST_SECRET: ${{ secrets.TEST_SECRET }}
          APP_DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          APP_DATABRICKS_PATH: ${{ secrets.DATABRICKS_PATH }}
        run: |
          databricks secrets put-secret lineage-secret-scope CLIENT_ID       --string-value "$APP_CLIENT_ID"
          databricks secrets put-secret lineage-secret-scope TEST_SECRET     --string-value "$APP_TEST_SECRET"
          databricks secrets put-secret lineage-secret-scope DATABRICKS_HOST --string-value "$APP_DATABRICKS_HOST"
          databricks secrets put-secret lineage-secret-scope DATABRICKS_PATH --string-value "$APP_DATABRICKS_PATH"

      - name: Deploy app from Git
        run: |
          databricks apps deploy secret-poc \
            --json '{"git_source": {"branch": "claude"}}'
