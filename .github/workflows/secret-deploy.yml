name: Deploy Databricks App secret

# Deploys the app from the current branch's code.
# Assumes secrets already exist in lineage-secret-scope.
# To update/rotate secrets, run the "Sync Secrets to Databricks Scope" workflow first.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # Auth for Databricks CLI (Azure Service Principal)
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: azure-client-secret
      ARM_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.DATABRICKS_TENANT_ID }}

    steps:
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Verify Databricks authentication
        run: databricks current-user me

      - name: Deploy app directly from GitHub
        run: |
          databricks apps deploy secret-poc \
            --json '{"git_source": {"branch": "claude"}}'
